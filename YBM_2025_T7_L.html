  timerInterval=setInterval(()=>{
    const m=Math.floor(timeLeft/60), s=timeLeft%60;
    timerEl.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    timeLeft--;
    if(timeLeft<0){ clearInterval(timerInterval); alert("Hết giờ!"); gradeQuiz(); }
  },1000);
}

// PARSE RAW_DATA
function parseSheet(rawText){
  if(!rawText.trim()) return [];
  const lines=rawText.trim().split('\n');
  const questions=[];
  lines.forEach((line,index)=>{
    const cols=line.split('\t');
    questions.push({
      id: cols[0]||index+1,
      skill: (cols[1]||'').toLowerCase(),
      group: cols[3]||('G'+(index+1)),
      type: (cols[4]||'mcq').toLowerCase(),
      passage: cols[5]||'',
      question: cols[6]||'',
      options: [cols[7]||'',cols[8]||'',cols[9]||'',cols[10]||''],
      answer: (cols[11]||'').trim()
    });
  });
  return questions;
}

// RENDER QUIZ
function renderQuiz(questions){
  const quizDiv=document.getElementById('quiz'); quizDiv.innerHTML='';
  const groups={}; const groupOrder=[];
  questions.forEach(q=>{
    const key=q.group;
    if(!groups[key]){ groups[key]={skill:q.skill, passage:q.passage, questions:[]}; groupOrder.push(key); }
    groups[key].questions.push(q);
  });

  groupOrder.forEach(key=>{
    const g=groups[key]; const pTrim=g.passage||'';
    const layout=document.createElement('div'); layout.className='reading-layout group-container';
    const left=document.createElement('div'); left.className='reading-left group-block';
    const title=document.createElement('h2'); title.textContent=(g.skill==='math'?'Math ':'Reading ')+key; left.appendChild(title);
    if(pTrim){
      const pd=document.createElement('div'); pd.className='passage';
      pd.innerHTML=pTrim.replace(/\[IMG:([^\]]+)\]/gi,(m,u)=>renderImgToken(u));
      left.appendChild(pd);
    }
    const right=document.createElement('div'); right.className='reading-right';
    g.questions.forEach(q=>{
      const qDiv=document.createElement('div'); qDiv.className='question'; qDiv.dataset.answer=q.answer||''; qDiv.dataset.type=q.type||'short';
      const p=document.createElement('p'); p.innerHTML=`<span class="question-number">${q.id}.</span> ${escapeHtml(q.question)}`; qDiv.appendChild(p);
      if(q.type==='mcq'){ ['A','B','C','D'].forEach((lbl,i)=>{
        if(!q.options[i]) return;
        const l=document.createElement('label');
        const r=document.createElement('input');
        r.type='radio'; r.name='q'+q.id; r.value=lbl;
        l.appendChild(r); l.appendChild(document.createTextNode(` ${lbl}. ${q.options[i]}`));
        qDiv.appendChild(l); qDiv.appendChild(document.createElement('br'));
      }); }
      else { const input=document.createElement('input'); input.type='text'; input.name='q'+q.id; input.className='short-answer-input'; qDiv.appendChild(input);}
      right.appendChild(qDiv);
    });
    layout.appendChild(left); layout.appendChild(right); quizDiv.appendChild(layout);
  });

  groupContainers=Array.from(document.querySelectorAll('.group-container'));
  groupContainers.forEach(c=>c.style.display='none');
  if(groupContainers.length) groupContainers[0].style.display='';
  totalQuestions=quizDiv.querySelectorAll('.question').length;
}

// SHOW GROUP
function showGroup(index){
  if(!groupContainers.length) return;
  // Dừng tất cả audio khi chuyển
  document.querySelectorAll('audio').forEach(a=>{ a.pause(); a.currentTime=0; });
  document.querySelectorAll('iframe.audio-frame').forEach(f=>f.src=f.src);

  groupContainers.forEach((c,i)=>c.style.display=(i===index)?'':'');
  currentGroupIndex=index;
  updateNavButtons();
}

// NAV BUTTONS
function updateNavButtons(){
  const prevBtn=document.getElementById('prevPartBtn');
  const nextBtn=document.getElementById('nextPartBtn');
  const submitBtn=document.getElementById('submitBtn');

  // Back chỉ hiện khi nộp bài
  prevBtn.style.display = isFinalized ? (currentGroupIndex>0?'inline-block':'none') : 'none';
  nextBtn.style.display = (currentGroupIndex<groupContainers.length-1)?'inline-block':'none';
  submitBtn.style.display = 'inline-block';
}

// SUBMIT / GRADE
function gradeQuiz(){
  if(isFinalized) return;
  isFinalized=true;
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }

  const quizDiv=document.getElementById('quiz');
  const questionDivs=quizDiv.querySelectorAll('.question');
  let correct=0, wrongList=[];
  questionDivs.forEach((div,i)=>{
    const type=div.dataset.type||'short';
    const answerList=(div.dataset.answer||'').split('|').map(s=>s.trim()).filter(s=>s);
    let user='';
    if(type==='mcq'){ const c=div.querySelector('input[type="radio"]:checked'); if(c) user=normalizeText(c.value);}
    else{ const input=div.querySelector('input[type="text"]'); if(input) user=normalizeText(input.value);}
    if(answerList.includes(user)) correct++; else wrongList.push(i+1);
    div.querySelectorAll('input[type="radio"],input[type="text"]').forEach(i=>i.disabled=true);
  });

  const box=document.getElementById('resultBox'); box.style.display='block';
  box.innerHTML=`<div><strong>Đúng ${correct}/${questionDivs.length} câu</strong></div>
                 <div><strong>Các câu sai: </strong>${wrongList.join(', ')}</div>`;
  updateNavButtons();
}

// ---------- START BUTTON ----------
document.getElementById('startBtn').addEventListener('click',()=>{
  const n=document.getElementById('studentName').value.trim();
  const c=document.getElementById('studentClass').value.trim();
  if(!n||!c){ alert('Nhập đầy đủ Họ tên và Lớp/Nhóm'); return; }
  document.getElementById('startBtn').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('submitBtn').style.display='inline-block';
  document.getElementById('prevPartBtn').style.display='none';
  document.getElementById('nextPartBtn').style.display='inline-block';
  document.getElementById('retryBtn').style.display='inline-block';
  if(groupContainers.length) groupContainers[0].style.display='';
  startTimer(DURATION_MINUTES*60);
});

// ---------- NAV BUTTONS ----------
document.getElementById('nextPartBtn').addEventListener('click',()=>{ showGroup(currentGroupIndex+1); });
document.getElementById('prevPartBtn').addEventListener('click',()=>{ showGroup(currentGroupIndex-1); });
document.getElementById('submitBtn').addEventListener('click',()=>{ gradeQuiz(); });
document.getElementById('retryBtn').addEventListener('click',()=>{ location.reload(); });

// ---------- INIT ----------
(function initExam(){ const qs=parseSheet(RAW_DATA); if(!qs.length){ document.getElementById('quiz').innerHTML='<p style="color:red;">RAW_DATA trống</p>'; return;} renderQuiz(qs); })();
</script>
