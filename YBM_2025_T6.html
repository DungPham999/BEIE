h1 { text-align:center; font-size:26px; margin-bottom:10px; }
h2 { margin-top:10px; margin-bottom:8px; font-size:18px; border-bottom:1px solid #ccc; padding-bottom:4px; }
.info { border:1px solid #ddd; border-radius:6px; padding:10px 12px; margin-bottom:12px; background:#fafafa; font-size:15px; }
.info input { padding:6px 8px; font-size:15px; }
.group-block { border:1px solid #eee; border-radius:6px; padding:10px 12px; margin-bottom:15px; background:#fafafa; }
.passage { margin:8px 0 12px 0; padding:8px 10px; border-left:3px solid #007acc; background:#fff; font-size:14px; }
.question { margin-bottom:12px; padding:8px; border-bottom:1px dashed #ddd; background:#fff; font-size:15px; }

.btn { padding:8px 14px; margin-right:8px; border-radius:4px; border:1px solid #888; background:#f5f5f5; cursor:pointer; font-size:15px; }
.btn:hover { background:#e0e0e0; }
#timer { font-weight:bold; color:red; }
.result { border:1px solid #ddd; border-radius:6px; padding:10px 12px; margin-top:12px; background:#fff; font-size:15px; }
.short-answer-input { width:80%; max-width:400px; padding:6px 8px; font-size:15px; }
.img-frame { width:auto; max-width:100%; height:auto; display:block; margin:6px 0; }
.reading-layout { display:flex; gap:20px; align-items:flex-start; margin-bottom:15px; }
.reading-left { flex:1.8; min-width:0; }
.reading-right { flex:1; }
.palette-btn { width:36px; height:36px; text-align:center; line-height:36px; border:1px solid #000; border-radius:4px; cursor:pointer; background:#fff; font-weight:bold; margin:2px; }
.palette-btn.done { background:#000; color:#fff; }
.palette-btn.correct { background:#4CAF50; color:#fff; }
.palette-btn.incorrect { background:#f44336; color:#fff; }
#paletteContainer { display:flex; flex-wrap:wrap; margin:10px 0; }
@media (max-width:768px){ .reading-layout{flex-direction:column;} .reading-left,.reading-right{width:100%;} .img-frame{width:100%; height:auto;} }
</style>
</head>

// ------------------ INIT ------------------
let currentGroupIndex = 0;
let timerInterval = null;
let timeLeft = DURATION_MINUTES*60;

// ------------------ TIMER ------------------
function startTimer(){
  const timerEl = document.getElementById('timer');
  timerInterval = setInterval(()=>{
    let m=Math.floor(timeLeft/60), s=timeLeft%60;
    timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    timeLeft--; if(timeLeft<0){ clearInterval(timerInterval); alert("Hết giờ!"); }
  },1000);
}

// ------------------ HELPER ------------------
function escapeHtml(str){ return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function normalizeText(str){ return (str||'').toLowerCase().replace(/[\u2018\u2019]/g,"'").replace(/\s+/g,' ').trim(); }

// ------------------ RENDER QUIZ ------------------
function renderQuiz(questions){
  const quizDiv = document.getElementById('quiz'); quizDiv.innerHTML='';
  const groups = {}; const groupOrder=[];
  questions.forEach((q,i)=>{
    const key = q.group||('G'+q.id);
    if(!groups[key]){ groups[key]={skill:q.skill, passage:q.passage, questions:[]}; groupOrder.push(key);}
    groups[key].questions.push(q);
  });

  let questionCounter=0;
  groupOrder.forEach(key=>{
    const g=groups[key], pTrim=(g.passage||'').trim();
    if(g.skill==='reading'){
      const layout=document.createElement('div'); layout.className='reading-layout group-container';
      const left=document.createElement('div'); left.className='reading-left group-block';
      const title=document.createElement('h2'); title.textContent='Reading '+key; left.appendChild(title);
      if(pTrim){ const passageDiv=document.createElement('div'); passageDiv.className='passage';
        passageDiv.innerHTML=pTrim.replace(/\[IMG:([^\]]+)\]/gi,(m,url)=>`<img class="img-frame" src="${url}">`);
        left.appendChild(passageDiv);
      }
      const right=document.createElement('div'); right.className='reading-right';
      g.questions.forEach(q=>{
        questionCounter++; const qDiv=document.createElement('div'); qDiv.className='question'; qDiv.dataset.answer=q.answer||''; qDiv.dataset.type=q.type||'short';
        const titleP=document.createElement('p'); titleP.innerHTML=`<span class="question-number">${questionCounter}.</span> ${escapeHtml(q.question)}`;
        qDiv.appendChild(titleP);
        if(q.type==='mcq'){ ['A','B','C','D'].forEach((lbl,i)=>{ if(!q.options[i]) return; const l=document.createElement('label'); const r=document.createElement('input'); r.type='radio'; r.name='q'+questionCounter; r.value=lbl; l.appendChild(r); l.appendChild(document.createTextNode(` ${lbl}. ${q.options[i]}`)); qDiv.appendChild(l); qDiv.appendChild(document.createElement('br')); }); }
        else { const input=document.createElement('input'); input.type='text'; input.name='q'+questionCounter; input.className='short-answer-input'; qDiv.appendChild(input); }
        right.appendChild(qDiv);
      });
      layout.appendChild(left); layout.appendChild(right); quizDiv.appendChild(layout);
    }
  });

  // Render palette
  renderPalette(questionCounter);
}

// ------------------ PALETTE ------------------
function renderPalette(total){
  const container=document.getElementById('paletteContainer'); container.innerHTML='';
  for(let i=1;i<=total;i++){
    const btn=document.createElement('div'); btn.className='palette-btn'; btn.textContent=i; btn.dataset.qIndex=i-1;
    btn.addEventListener('click',()=>{ showQuestion(i-1); });
    container.appendChild(btn);
  }
}
function markQuestionDone(i){ const btn=document.querySelector(`.palette-btn[data-q-index="${i}"]`); if(btn) btn.classList.add('done'); }
function showQuestion(i){ const divs=document.querySelectorAll('.question'); if(i>=0&&i<divs.length){ divs[i].scrollIntoView({behavior:'smooth',block:'center'}); } }
function updatePaletteAfterGrading(){ const divs=document.querySelectorAll('.question'); divs.forEach((div,i)=>{ const btn=document.querySelector(`.palette-btn[data-q-index="${i}"]`); if(!btn) return; let user=''; const answerList=(div.dataset.answer||'').split('|').map(s=>s.trim()).filter(s=>s); const type=div.dataset.type||'short'; if(type==='mcq'){ const c=div.querySelector('input[type="radio"]:checked'); if(c) user=normalizeText(c.value);} else { const input=div.querySelector('input[type="text"]'); if(input) user=normalizeText(input.value);} if(!user) return; btn.classList.remove('done'); btn.classList.add(answerList.includes(user)?'correct':'incorrect'); }); }

// ------------------ START BUTTON ------------------
document.getElementById('startBtn').addEventListener('click',()=>{
  const n=document.getElementById('studentName').value.trim();
  const c=document.getElementById('studentClass').value.trim();
  if(!n||!c){ alert('Nhập đủ Họ tên và Lớp/Nhóm'); return; }
  document.getElementById('startBtn').style.display='none';
  startTimer();
  // Nếu có audio
  const audio=document.querySelector('.audio-frame'); if(audio){ audio.style.display='none'; const a=audio.contentWindow.document.querySelector('audio'); a.play(); a.onended=()=>{ showGroup(currentGroupIndex+1); }; }
});

// ------------------ INIT ------------------
(function initExam(){ const qs=parseSheet(RAW_DATA); if(!qs.length){ document.getElementById('quiz').innerHTML='<p style="color:red;">RAW_DATA trống</p>'; return; } renderQuiz(qs); })();
